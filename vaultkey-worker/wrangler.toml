name = "vaultkey-backend"
main = "src/worker.js"
compatibility_date = "2024-01-01"

# KV Namespace for storing activation codes
[[kv_namespaces]]
binding = "VAULTKEY_KV"
id = "YOUR_KV_NAMESPACE_ID"

[vars]
AFDIAN_USER_ID = "YOUR_AFDIAN_USER_ID"
AFDIAN_TOKEN = "YOUR_AFDIAN_TOKEN"
SECRET_KEY = "VaultKey-2024-Subscription-Secret-Key-Do-Not-Share"
